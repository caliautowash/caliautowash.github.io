<style>
  :root {
    /* Golden Hour palette — warm California */
    --cream: oklch(0.972 0.014 78);
    --cream-2: oklch(0.945 0.018 75);
    --cream-3: oklch(0.905 0.022 72);
    --ink: oklch(0.22 0.015 60);
    --ink-soft: oklch(0.42 0.012 60);
    --ink-dim: oklch(0.62 0.01 60);
    --rule: oklch(0.86 0.02 70);
    --terracotta: oklch(0.62 0.15 45);
    --terracotta-deep: oklch(0.48 0.14 40);
    --sage: oklch(0.62 0.065 140);
    --sand: oklch(0.88 0.04 78);
    --sun: oklch(0.80 0.14 82);

    --font-display: 'Fraunces', 'Times New Roman', serif;
    --font-body: 'Geist', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    --radius: 4px;
    --radius-lg: 10px;
  }

  /* palette variants via [data-palette] on <html> */
  html[data-palette="coastal"] {
    --cream: oklch(0.97 0.012 220);
    --cream-2: oklch(0.94 0.018 220);
    --cream-3: oklch(0.90 0.024 220);
    --ink: oklch(0.22 0.035 250);
    --terracotta: oklch(0.60 0.12 240);
    --terracotta-deep: oklch(0.45 0.11 240);
    --sage: oklch(0.70 0.09 195);
    --sand: oklch(0.86 0.04 220);
    --sun: oklch(0.82 0.10 220);
  }
  html[data-palette="desert"] {
    --cream: oklch(0.94 0.020 60);
    --cream-2: oklch(0.90 0.030 55);
    --cream-3: oklch(0.85 0.038 50);
    --ink: oklch(0.24 0.025 40);
    --terracotta: oklch(0.55 0.16 35);
    --terracotta-deep: oklch(0.42 0.14 30);
    --sage: oklch(0.58 0.07 125);
    --sand: oklch(0.82 0.06 60);
    --sun: oklch(0.78 0.14 70);
  }
  html[data-palette="midnight"] {
    --cream: oklch(0.17 0.015 260);
    --cream-2: oklch(0.21 0.018 260);
    --cream-3: oklch(0.26 0.020 260);
    --ink: oklch(0.95 0.01 80);
    --ink-soft: oklch(0.80 0.01 80);
    --ink-dim: oklch(0.60 0.01 80);
    --rule: oklch(0.30 0.018 260);
    --terracotta: oklch(0.70 0.13 55);
    --terracotta-deep: oklch(0.55 0.15 50);
    --sage: oklch(0.75 0.08 150);
    --sand: oklch(0.25 0.02 260);
    --sun: oklch(0.80 0.14 80);
  }

  /* type variants */
  html[data-type="serif-mono"] {
    --font-display: 'Fraunces', serif;
    --font-body: 'JetBrains Mono', ui-monospace, monospace;
  }
  html[data-type="geist-only"] {
    --font-display: 'Geist', system-ui, sans-serif;
    --font-body: 'Geist', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--cream);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02";
  }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  ul, ol { list-style: none; }

  /* soft paper texture — disabled; mix-blend-mode causes compositing issues on long sessions */
  body::before { display: none; }

  .wrap { max-width: 1360px; margin: 0 auto; padding: 0 2rem; }

  /* Type */
  .display {
    font-family: var(--font-display);
    font-weight: 400;
    font-optical-sizing: auto;
    letter-spacing: -0.02em;
    line-height: 0.95;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .rule {
    height: 1px;
    background: var(--rule);
    border: 0;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 0.55rem;
    font-family: var(--font-body);
    font-size: 0.88rem; font-weight: 500;
    padding: 0.85rem 1.35rem;
    border-radius: var(--radius);
    transition: transform 0.3s var(--ease), background 0.3s var(--ease), color 0.3s var(--ease), border-color 0.3s var(--ease);
    letter-spacing: -0.005em;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--cream);
  }
  .btn-primary:hover {
    background: color-mix(in oklch, var(--ink) 85%, white);
    color: var(--cream);
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border-color: var(--ink);
  }
  .btn-ghost:hover {
    background: color-mix(in oklch, var(--ink) 6%, transparent);
    border-color: var(--ink);
    color: var(--ink);
  }
  .btn-accent {
    background: var(--terracotta);
    color: var(--cream);
    position: relative;
    overflow: hidden;
  }
  .btn-accent:hover { background: var(--terracotta); }
  .btn-accent .shine {
    position: absolute; inset: 0;
    background: linear-gradient(100deg,
      transparent 35%,
      color-mix(in oklch, white 22%, transparent) 50%,
      transparent 65%);
    transform: translateX(-120%);
    transition: transform 0.7s var(--ease);
    pointer-events: none;
  }
  .btn-accent:hover .shine { transform: translateX(120%); }
  .btn-accent > *:not(.shine) { position: relative; z-index: 1; }
  .btn .arrow {
    transition: transform 0.3s var(--ease);
    display: inline-block;
  }
  .btn:hover .arrow { transform: translateX(3px); }

  /* Reveal — only hide if observer is actively tracking (has data-reveal-armed) */
  .reveal { transition: opacity 0.9s var(--ease), transform 0.9s var(--ease); }
  .reveal[data-reveal-armed="1"] { opacity: 0; transform: translateY(24px); }
  .reveal.in { opacity: 1; transform: none; }

  /* number tick */
  .num-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
  }

  .hide-mobile { display: inline-flex; }
  .show-mobile { display: none; }
  .hide-small { display: block; }

  .nav-link-pill { position: relative; }
  .nav-link-pill:hover {
    background: color-mix(in oklch, var(--ink) 8%, transparent);
    color: var(--ink) !important;
  }

  .nav-link-edt { position: relative; text-decoration: none; }
  .nav-link-edt::after {
    content: '';
    position: absolute; left: 0.85rem; right: 0.85rem; bottom: 0.35rem;
    height: 1px; background: var(--ink);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.35s var(--ease);
  }
  .nav-link-edt:hover::after { transform: scaleX(1); }
  .nav-link-edt:hover span:first-child { color: var(--ink) !important; }

  @keyframes dot-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  @keyframes btn-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes btn-nudge {
    0%, 88%, 100% { transform: translateY(0) scale(1); }
    92% { transform: translateY(-5px) scale(1.02); }
    96% { transform: translateY(-2px) scale(1.01); }
  }
  .btn-bounce {
    animation: btn-nudge 4.5s ease-in-out infinite;
    box-shadow: 0 0 0 0 color-mix(in oklch, var(--terracotta) 40%, transparent);
  }
  .btn-bounce::before {
    content: '';
    position: absolute; inset: -4px;
    border: 1px solid var(--terracotta);
    border-radius: inherit;
    opacity: 0;
    animation: btn-halo 4.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes btn-halo {
    0%, 85%, 100% { opacity: 0; transform: scale(0.96); }
    92%           { opacity: 0.6; transform: scale(1); }
    98%           { opacity: 0; transform: scale(1.08); }
  }
  .btn-bounce:hover {
    animation: none;
    transform: translateY(-2px);
    box-shadow: 0 14px 28px -14px color-mix(in oklch, var(--terracotta-deep) 80%, transparent);
  }
  .btn-bounce {
    position: relative;
    transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }
  @media (prefers-reduced-motion: reduce) {
    .btn-bounce { animation: none !important; }
    .btn-bounce::before { animation: none !important; }
  }

  @media (max-width: 960px) {
    .hide-small { display: none !important; }
  }

  @media (max-width: 720px) {
    .wrap { padding: 0 1.25rem; }
    .hide-mobile { display: none !important; }
    .show-mobile { display: flex !important; }
  }

</style>
</head>
